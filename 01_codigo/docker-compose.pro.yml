services:
  db:
    image: postgres:16-alpine
    container_name: rentamaq_db_pro
    restart: always
    environment:
      POSTGRES_USER: rentamaq_pro
      POSTGRES_PASSWORD: pro_password
      POSTGRES_DB: rentamaq_pro
    ports:
      - "5434:5432"
    volumes:
      - rentamaq_pro_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentamaq_pro -d rentamaq_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rentamaq_app_pro
    restart: always
    env_file: backend/.env.pro
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  rentamaq_pro_data:
