# DEV — referencia. El entorno DEV corre sin Docker.
# Arranque manual: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8080
# Este archivo existe para referencia y para poder arrancar la BD en Docker si se desea.

services:
  db:
    image: postgres:16-alpine
    container_name: rentamaq_db_dev
    environment:
      POSTGRES_USER: rentamaq_user
      POSTGRES_PASSWORD: rentamaq123
      POSTGRES_DB: rentamaq_db
    ports:
      - "5432:5432"
    volumes:
      - rentamaq_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentamaq_user -d rentamaq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rentamaq_app_dev
    env_file: backend/.env.dev
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  rentamaq_dev_data:
